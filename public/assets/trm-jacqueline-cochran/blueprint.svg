<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Grid Background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#0b1329" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Title & Blueprint Labels -->
  <text x="40" y="60" fill="#3b82f6" font-family="monospace" font-size="20" font-weight="bold" letter-spacing="2">TRM ATCT - ARCHITECTURAL DESIGN SCHEMATIC</text>
  <text x="40" y="90" fill="#64748b" font-family="monospace" font-size="12">LOCATION: JACQUELINE COCHRAN REGIONAL (THERMAL, CA) // Reliever Tower Spec</text>
  <line x1="40" y1="105" x2="760" y2="105" stroke="#334155" stroke-width="2" />

  <!-- Control Tower Elevation Outline -->
  <g transform="translate(150, 150)" stroke="#3b82f6" stroke-width="1.5" fill="none">
    <!-- Ground Line -->
    <line x1="-50" y1="350" x2="350" y2="350" stroke="#475569" stroke-width="3" />
    
    <!-- Base Building Structure -->
    <rect x="30" y="250" width="240" height="100" stroke-dasharray="4" />
    <text x="150" y="305" fill="#475569" font-family="sans-serif" font-size="12" text-anchor="middle">BASE OPERATIONS / RADAR HUB</text>

    <!-- Tower Shaft -->
    <line x1="110" y1="250" x2="110" y2="80" />
    <line x1="190" y1="250" x2="190" y2="80" />
    <line x1="110" y1="160" x2="190" y2="160" stroke-dasharray="2" />
    <text x="150" y="195" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle" transform="rotate(-90, 150, 195)">SHAFT HEIGHT: 82' AGL</text>

    <!-- Junction / Stairwell Platform -->
    <polygon points="100,80 200,80 215,50 85,50" />
    
    <!-- Control Cab -->
    <polygon points="75,50 225,50 245,-15 55,-15" fill="rgba(59, 130, 246, 0.05)" />
    <!-- Cab Window Panes -->
    <line x1="105" y1="50" x2="85" y2="-15" />
    <line x1="150" y1="50" x2="150" y2="-15" />
    <line x1="195" y1="50" x2="215" y2="-15" />
    
    <!-- Roof Antennae -->
    <line x1="150" y1="-15" x2="150" y2="-45" />
    <circle cx="150" cy="-45" r="3" fill="#3b82f6" />
    <line x1="120" y1="-15" x2="105" y2="-35" />
    <line x1="180" y1="-15" x2="195" y2="-35" />
  </g>

  <!-- Spec Sheet Panel -->
  <g transform="translate(500, 150)" fill="none" stroke="#334155" stroke-width="1">
    <rect width="260" height="350" rx="8" fill="rgba(15, 23, 42, 0.4)" />
    <text x="20" y="40" fill="#3b82f6" font-family="monospace" font-size="14" font-weight="bold">SPECIFICATIONS</text>
    <text x="20" y="80" fill="#94a3b8" font-family="monospace" font-size="11">CAB HEIGHT: 82 FT AGL</text>
    <text x="20" y="110" fill="#94a3b8" font-family="monospace" font-size="11">POSITIONS: 3 ACTIVE CONS.</text>
    <text x="20" y="140" fill="#94a3b8" font-family="monospace" font-size="11">VISIBILITY: EXPANDED FIELD</text>
    <text x="20" y="170" fill="#94a3b8" font-family="monospace" font-size="11">FAA CLASS: CONTRACT TOWER</text>
    <text x="20" y="200" fill="#94a3b8" font-family="monospace" font-size="11">SITE LAYOUT: BY KSA ENGIN.</text>
    <text x="20" y="230" fill="#94a3b8" font-family="monospace" font-size="11">SCHEMATIC STAGE: 100% DONE</text>
  </g>
</svg>
