<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Grid Background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#0b1329" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Title & Blueprint Labels -->
  <text x="40" y="60" fill="#00F2FE" font-family="monospace" font-size="20" font-weight="bold" letter-spacing="2">F70 ATCT - ARCHITECTURAL DESIGN SCHEMATIC</text>
  <text x="40" y="90" fill="#64748b" font-family="monospace" font-size="12">LOCATION: FRENCH VALLEY AIRPORT (MURRIETA, CA) // POND &amp; CO / KSA PARTNERSHIP</text>
  <line x1="40" y1="105" x2="760" y2="105" stroke="#334155" stroke-width="2" />

  <!-- Control Tower Elevation Outline -->
  <g transform="translate(150, 150)" stroke="#00F2FE" stroke-width="1.5" fill="none">
    <!-- Ground Line -->
    <line x1="-50" y1="350" x2="350" y2="350" stroke="#475569" stroke-width="3" />
    
    <!-- Base Building Structure -->
    <rect x="50" y="270" width="200" height="80" stroke-dasharray="4" />
    <text x="150" y="315" fill="#475569" font-family="sans-serif" font-size="12" text-anchor="middle">BASE UTILITIES / EQUIP ROOM</text>

    <!-- Tower Shaft -->
    <line x1="120" y1="270" x2="120" y2="100" />
    <line x1="180" y1="270" x2="180" y2="100" />
    <line x1="120" y1="180" x2="180" y2="180" stroke-dasharray="2" />
    <text x="150" y="215" fill="#64748b" font-family="sans-serif" font-size="10" text-anchor="middle" transform="rotate(-90, 150, 215)">SHAFT HEIGHT: 65' AGL</text>

    <!-- Junction / Stairwell Platform -->
    <polygon points="110,100 190,100 200,70 100,70" />
    
    <!-- Control Cab -->
    <polygon points="90,70 210,70 230,10 70,10" fill="rgba(0, 242, 254, 0.05)" />
    <!-- Cab Window Panes -->
    <line x1="110" y1="70" x2="95" y2="10" />
    <line x1="150" y1="70" x2="150" y2="10" />
    <line x1="190" y1="70" x2="205" y2="10" />
    
    <!-- Roof Antennae -->
    <line x1="150" y1="10" x2="150" y2="-20" />
    <circle cx="150" cy="-20" r="3" fill="#00F2FE" />
    <line x1="130" y1="10" x2="120" y2="-10" />
    <line x1="170" y1="10" x2="180" y2="-10" />
  </g>

  <!-- Spec Sheet Panel -->
  <g transform="translate(500, 150)" fill="none" stroke="#334155" stroke-width="1">
    <rect width="260" height="350" rx="8" fill="rgba(15, 23, 42, 0.4)" />
    <text x="20" y="40" fill="#00F2FE" font-family="monospace" font-size="14" font-weight="bold">SPECIFICATIONS</text>
    <text x="20" y="80" fill="#94a3b8" font-family="monospace" font-size="11">CAB HEIGHT: 65 FT AGL</text>
    <text x="20" y="110" fill="#94a3b8" font-family="monospace" font-size="11">POSITIONS: 2 ACTIVE CONS.</text>
    <text x="20" y="140" fill="#94a3b8" font-family="monospace" font-size="11">VISIBILITY: 360-DEG CLEAR</text>
    <text x="20" y="170" fill="#94a3b8" font-family="monospace" font-size="11">FAA CLASS: CONTRACT TOWER</text>
    <text x="20" y="200" fill="#94a3b8" font-family="monospace" font-size="11">SITE LAYOUT: BY KSA ENGIN.</text>
    <text x="20" y="230" fill="#94a3b8" font-family="monospace" font-size="11">SCHEMATIC STAGE: 100% DONE</text>
  </g>
</svg>
